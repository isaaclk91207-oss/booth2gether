services:
  mysql:
    image: mysql:8.0
    container_name: booth2gether-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: booth2gether
      MYSQL_DATABASE: booth2gether
      MYSQL_USER: booth
      MYSQL_PASSWORD: booth2gether
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: